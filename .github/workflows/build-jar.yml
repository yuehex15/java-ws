name: Build jar

on:
  workflow_dispatch: # 开启手动触发
    inputs:
      release_name:
        description: '请输入版本名称 (例如: v1.0, latest, test). 同名将覆盖.'
        required: true
        default: 'latest'

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn clean package
        
      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find target -name "server.jar" -type f | head -1)
          # 为了区分，我们可以将 jar 重命名为用户输入的名称
          NEW_NAME="server-${{ github.event.inputs.release_name }}.jar"
          cp "$JAR_FILE" "$NEW_NAME"
          echo "jar_file=$NEW_NAME" >> $GITHUB_OUTPUT
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # 使用用户输入的名称作为 Tag
          tag_name: ${{ github.event.inputs.release_name }}
          name: Build ${{ github.event.inputs.release_name }}
          body: |
            ## Info
            Manual build triggered.
            Version: ${{ github.event.inputs.release_name }}
          files: ${{ steps.jar-name.outputs.jar_file }}
          # 如果 tag 存在，overwrite: true 会覆盖该 tag 下的文件
          make_latest: ${{ github.event.inputs.release_name == 'latest' }}
          overwrite: true 
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: javaws-${{ github.event.inputs.release_name }}
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 30
