name: Build jar

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_name:
        description: '请输入版本名称 (例如: v1.0, latest). 相同名称将覆盖.'
        required: true
        default: 'latest'

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn clean package
        
      - name: Get JAR file name
        id: jar-name
        run: |
          # 查找生成的 jar 文件
          JAR_FILE=$(find target -name "server.jar" -type f | head -1)
          
          # 定义新文件名
          NEW_NAME="server-${{ github.event.inputs.release_name || 'latest' }}.jar"
          cp "$JAR_FILE" "$NEW_NAME"
          
          echo "jar_file=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "Found and copied JAR file to: $NEW_NAME"
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 如果是手动触发，使用输入的名称；如果是自动触发，使用 latest
          tag_name: ${{ github.event.inputs.release_name || 'latest' }}
          name: Build ${{ github.event.inputs.release_name || 'latest' }}
          body: |
            ## Info
            Java serverless build vless/trojan/shadowsocks on java server, no need core.
            Build trigger: ${{ github.event_name }}
          files: ${{ steps.jar-name.outputs.jar_file }}
          # 只有名称为 latest 时，才将其标记为最新版本
          make_latest: ${{ (github.event.inputs.release_name == 'latest' || github.event_name != 'workflow_dispatch') && 'true' || 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: java
