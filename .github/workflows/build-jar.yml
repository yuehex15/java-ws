name: Build jar

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: '请输入版本名称 (例如: v1.0, latest). 相同名称将覆盖.'
        required: true
        default: 'latest'

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn clean package
        
      - name: Prepare JAR file
        id: prepare-jar
        run: |
          # 查找并重命名
          JAR_SRC=$(find target -name "server.jar" -type f | head -1)
          TARGET_NAME="server-${{ github.event.inputs.release_name || 'latest' }}.jar"
          cp "$JAR_SRC" "$TARGET_NAME"
          # 将路径输出
          echo "jar_path=$TARGET_NAME" >> $GITHUB_OUTPUT
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_name || 'latest' }}
          name: Build ${{ github.event.inputs.release_name || 'latest' }}
          body: |
            ## Info
            Java serverless build vless/trojan/shadowsocks on java server.
            Version: ${{ github.event.inputs.release_name || 'latest' }}
          # 明确指定文件路径
          files: |
            ${{ steps.prepare-jar.outputs.jar_path }}
          make_latest: ${{ (github.event.inputs.release_name == 'latest' || github.event_name != 'workflow_dispatch') && 'true' || 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ steps.prepare-jar.outputs.jar_path }}
          retention-days: 30
